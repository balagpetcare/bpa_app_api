services:
  bpa_db:
    image: postgres:16-alpine
    container_name: bpa_db
    environment:
      POSTGRES_USER: bpa_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bpa_pet_db
    ports:
      - "5432:5432"
    volumes:
      - bpa_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpa_admin -d bpa_pet_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - bpa_net

  bpa-storage:
    image: minio/minio:latest
    container_name: bpa-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bpa_minio_data:/data
    networks:
      - bpa_net

  bpa_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bpa_api
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      bpa_db:
        condition: service_healthy
      bpa-storage:
        condition: service_started
    networks:
      - bpa_net
    # Dev-friendly: hot reload (optional). If you don't want bind-mount, comment these lines.
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  bpa_pg_data:
  bpa_minio_data:

networks:
  bpa_net:
    driver: bridge
